<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu ❤️</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to right, #ff9a9e, #fad0c4);
        text-align: center;
        color: white;
    }

    .container {
        padding: 50px;
    }

    h1 {
        font-size: 3em;
        animation: fadeIn 2s ease-in-out;
    }

    p {
        font-size: 1.3em;
        max-width: 600px;
        margin: 20px auto;
        line-height: 1.6;
    }

    button {
        background: white;
        color: #ff6b81;
        border: none;
        padding: 15px 25px;
        font-size: 1em;
        border-radius: 25px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff6b81;
        color: white;
    }

    .hidden {
        display: none;
        margin-top: 20px;
        font-size: 1.2em;
    }

    @keyframes fadeIn {
        from {opacity: 0;}
        to {opacity: 1;}
    }

    .heart {
        font-size: 50px;
        animation: heartbeat 1s infinite;
    }

    @keyframes heartbeat {
        0% { transform: scale(1); }
        25% { transform: scale(1.2); }
        50% { transform: scale(1); }
        75% { transform: scale(1.2); }
        100% { transform: scale(1); }
    }
</style>
</head>
<body>

<div class="container">
    <div class="heart">❤️</div>
    <h1>Hai Sayangku 💕</h1>
    
    <p>
        Aku cuma mau bilang...<br>
        Kamu itu spesial banget buat aku.<br>
        Terima kasih sudah hadir di hidupku dan bikin hari-hariku jadi lebih indah 🌸
    </p>

    <button onclick="tampilPesan()">Klik ini ya ❤️</button>

    <div id="pesan" class="hidden">
        <p>
            Aku sayang kamu, sekarang, besok, dan seterusnya 💖<br>
            Jangan pernah pergi ya... karena kamu rumahku 🏡
        </p>
    </div>
</div>

<script>
function tampilPesan() {
    document.getElementById("pesan").classList.remove("hidden");
}
</script>

</body>
</html>
